[build]
  publish   = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://cdn.buymeacoffee.com; connect-src 'self'; frame-ancestors 'none'"

[dev]
  command   = ""
  port      = 8888
  targetPort = 3000
  autoLaunch = false

[[redirects]]
  from   = "/rigs/:slug"
  to     = "/.netlify/functions/rig-page?slug=:slug"
  status = 200

[[redirects]]
  from   = "/contractors/:slug"
  to     = "/.netlify/functions/contractor-page?slug=:slug"
  status = 200

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200
