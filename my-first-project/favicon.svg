<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Sky -->
  <rect width="32" height="32" fill="#07071a"/>

  <!-- Stars -->
  <rect x="3"  y="2" width="1" height="1" fill="#ffffff"/>
  <rect x="9"  y="1" width="1" height="1" fill="#aabbdd"/>
  <rect x="23" y="3" width="1" height="1" fill="#8899bb"/>
  <rect x="29" y="1" width="1" height="1" fill="#ffffff"/>
  <rect x="1"  y="5" width="1" height="1" fill="#8899bb"/>
  <rect x="31" y="4" width="1" height="1" fill="#aabbdd"/>

  <!-- Aviation warning light (red, 2×2) -->
  <rect x="15" y="0" width="2" height="2" fill="#ff3a3a"/>

  <!-- Crown-block cap (steel) -->
  <rect x="13" y="2" width="6" height="2" fill="#3a4255"/>

  <!-- Left derrick beam (gold trapezoid) -->
  <polygon points="13,4 16,4 9,20 6,20" fill="#e8d44d"/>

  <!-- Right derrick beam (gold trapezoid) -->
  <polygon points="16,4 19,4 26,20 23,20" fill="#e8d44d"/>

  <!-- Interior cross-brace — mid height -->
  <rect x="13" y="13" width="6"  height="1" fill="#c8a000"/>

  <!-- Interior cross-brace — near base -->
  <rect x="11" y="18" width="10" height="1" fill="#c8a000"/>

  <!-- Platform / deck (dark steel) -->
  <rect x="4" y="20" width="24" height="4" fill="#2a3040"/>
  <!-- Deck top highlight -->
  <rect x="4" y="20" width="24" height="1" fill="#3a4255"/>

  <!-- Running lights (orange) -->
  <rect x="7"  y="21" width="2" height="2" fill="#ff6b35"/>
  <rect x="15" y="21" width="2" height="2" fill="#ff6b35"/>
  <rect x="23" y="21" width="2" height="2" fill="#ff6b35"/>

  <!-- Ocean -->
  <rect x="0" y="25" width="32" height="7" fill="#060e1e"/>

  <!-- Wave highlights -->
  <rect x="2"  y="25" width="5" height="1" fill="#112240"/>
  <rect x="10" y="26" width="4" height="1" fill="#112240"/>
  <rect x="18" y="25" width="6" height="1" fill="#112240"/>
  <rect x="26" y="26" width="4" height="1" fill="#112240"/>
</svg>
